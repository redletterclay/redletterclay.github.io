# Build Next.js and deploy the site to the gh-pages branch for GitHub Pages.
# In repo Settings > Pages, set "Deploy from a branch" and choose branch: gh-pages, folder: / (root).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: postgresql://payload:password@localhost:5432/payload
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      NEXT_PUBLIC_SERVER_URL: https://redletterclay.com
      NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT: https://ik.imagekit.io/raygun
      IMAGEKIT_PUBLIC_KEY: public_Q2fTsXleg/A7qsgEk8TmGXpmNho=
      IMAGEKIT_PRIVATE_KEY: ${{ secrets.IMAGEKIT_PRIVATE_KEY }}
      NEXT_PUBLIC_SNIPCART_API_KEY: N2M2YjYyZjYtNzI1Yy00YjgzLTgzNGQtOTYwNmVlNDNiZmM5NjM4MjA3MTM4MDAzMDcwNjM2

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: payload
          POSTGRES_PASSWORD: password
          POSTGRES_DB: payload
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore database snapshot
        run: psql -h localhost -U payload -d payload < db/snapshot.sql
        env:
          PGPASSWORD: password

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: bash scripts/build-static.sh

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          CNAME: redletterclay.com

      - name: Wait 5m for Pages deployment
        run: sleep 300

      - name: Trigger Snipcart recrawl
        run: |
          curl -sS -X POST "https://app.snipcart.com/api/products" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -u "${{ secrets.SNIPCART_API_KEY }}:" \
            -d '{"fetchUrl": "https://redletterclay.com/snipcart.json"}'
